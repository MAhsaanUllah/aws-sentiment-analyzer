<!DOCTYPE html>
<html>
<head>
    <title>Sentiment Analyzer</title>
    <style>
        body { font-family: Arial; max-width: 600px; 
               margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; 
                   font-size: 16px; padding: 10px; }
        button { background: #ff9900; color: white; 
                 border: none; padding: 15px 30px; 
                 font-size: 16px; cursor: pointer; 
                 margin-top: 10px; border-radius: 5px; }
        #result { margin-top: 20px; padding: 20px; 
                  border-radius: 10px; font-size: 24px; 
                  text-align: center; display: none; }
        .POSITIVE { background: #d4edda; color: #155724; }
        .NEGATIVE { background: #f8d7da; color: #721c24; }
        .NEUTRAL  { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <h1>🤖 AI Sentiment Analyzer</h1>
    <h3>Built on AWS Lambda</h3>
    <textarea id="text" 
        placeholder="Enter text here...">
    </textarea>
    <br>
    <button onclick="analyze()">
        Analyze Sentiment
    </button>
    <div id="result"></div>

    <script>
        async function analyze() {
            const text = document.getElementById('text').value;
            const result = document.getElementById('result');
            
            result.style.display = 'block';
            result.innerHTML = '⏳ Analyzing...';
            result.className = '';

            try {
                const response = await fetch(
                    'https://pi7aowsm33.execute-api.us-east-1.amazonaws.com/Production/analyze',
                    {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({text: text})
                    }
                );
                const data = await response.json();
                const sentiment = data.sentiment;
                const emoji = sentiment === 'POSITIVE' ? '😊' 
                            : sentiment === 'NEGATIVE' ? '😞' 
                            : '😐';
                
                result.className = sentiment;
                result.innerHTML = `${emoji} ${sentiment}`;
            } catch(e) {
                result.innerHTML = '❌ Error!';
            }
        }
    </script>
</body>
</html>
